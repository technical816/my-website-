<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f9;
}

nav {
  background: #444;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
}

nav a:hover {
  color: #ffd700;
}

main {
  padding: 20px;
  text-align: center;
}

video {
  margin: 10px;
  border-radius: 10px;
}

footer {
  background: #333;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<main>

<h2>My Videos</h2>

<!-- 🎥 Videos -->
<video width="300" controls onplay="pauseAll(this)">
  <source src="bajrangbali.mp4" type="video/mp4">
</video>

<video width="300" controls onplay="pauseAll(this)">
  <source src="khana.mp4" type="video/mp4">
</video>

<video width="300" controls onplay="pauseAll(this)">
  <source src="happy_propose_day.mp4" type="video/mp4">
</video>

<video width="300" controls onplay="pauseAll(this)">
  <source src="song.mp4" type="video/mp4">
</video>

</main>

<footer>
  <p>© 2026 My Website | All Rights Reserved</p>
</footer>

<script>
function pauseAll(currentVideo) {
  let videos = document.querySelectorAll("video");
  videos.forEach(video => {
    if (video !== currentVideo) {
      video.pause();
    }
  });
}
</script>

</body>
</html>
